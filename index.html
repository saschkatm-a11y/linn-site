<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Linn – ein kleiner Ort für große Ideen.">
    <meta name="robots" content="noindex, nofollow, noarchive">
    <meta name="theme-color" content="#080b10">
    <title>Linn</title>
    <style>
      :root {
        color-scheme: dark;
        --ink: #f7f8f2;
        --muted: #a8b0aa;
        --line: rgba(255, 255, 255, 0.12);
        --accent: #b7ff5a;
        --accent-soft: rgba(183, 255, 90, 0.16);
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-width: 320px;
        background: #080b10;
      }

      body {
        min-height: 100svh;
        margin: 0;
        overflow-x: hidden;
        color: var(--ink);
        background:
          radial-gradient(circle at 18% 14%, rgba(58, 83, 58, 0.44), transparent 34rem),
          radial-gradient(circle at 88% 88%, rgba(43, 74, 96, 0.38), transparent 30rem),
          #080b10;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body::before {
        position: fixed;
        inset: 0;
        z-index: -1;
        background-image: linear-gradient(var(--line) 1px, transparent 1px),
          linear-gradient(90deg, var(--line) 1px, transparent 1px);
        background-size: 72px 72px;
        mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.65), transparent 78%);
        content: "";
        opacity: 0.22;
      }

      .page {
        display: grid;
        min-height: 100svh;
        width: min(1180px, calc(100% - 40px));
        margin: 0 auto;
        grid-template-rows: auto 1fr auto;
      }

      .site-header,
      .site-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 92px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        color: var(--ink);
        font-size: 0.82rem;
        font-weight: 760;
        letter-spacing: 0.18em;
        text-decoration: none;
      }

      .brand-mark {
        display: grid;
        width: 38px;
        height: 38px;
        place-items: center;
        border: 1px solid rgba(183, 255, 90, 0.46);
        border-radius: 50%;
        color: var(--accent);
        background: var(--accent-soft);
        letter-spacing: 0;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        color: var(--muted);
        font-size: 0.78rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .status::before {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 18px var(--accent);
        content: "";
      }

      .hero {
        display: grid;
        align-content: center;
        min-height: 620px;
        padding: 64px 0 88px;
      }

      .eyebrow {
        margin: 0 0 22px;
        color: var(--accent);
        font-size: clamp(0.72rem, 1.3vw, 0.86rem);
        font-weight: 700;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }

      h1 {
        max-width: 930px;
        margin: 0;
        font-size: clamp(3.6rem, 10vw, 8.6rem);
        font-weight: 650;
        letter-spacing: -0.075em;
        line-height: 0.9;
      }

      h1 span {
        display: block;
        color: transparent;
        -webkit-text-stroke: 1px rgba(247, 248, 242, 0.48);
      }

      .intro {
        max-width: 580px;
        margin: 36px 0 0;
        color: var(--muted);
        font-size: clamp(1rem, 1.7vw, 1.24rem);
        line-height: 1.7;
      }

      .facts {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 44px;
      }

      .facts span {
        padding: 10px 15px;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: #d6dcd7;
        background: rgba(255, 255, 255, 0.035);
        font-size: 0.78rem;
        letter-spacing: 0.09em;
        text-transform: uppercase;
        backdrop-filter: blur(12px);
      }

      .site-footer {
        min-height: 82px;
        border-top: 1px solid var(--line);
        color: #727b75;
        font-size: 0.76rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      @media (max-width: 640px) {
        .page {
          width: min(1180px, calc(100% - 32px));
        }

        .site-header {
          min-height: 78px;
        }

        .status {
          font-size: 0;
        }

        .hero {
          min-height: auto;
          padding: 94px 0 110px;
        }

        h1 {
          font-size: clamp(3rem, 13.5vw, 3.4rem);
          letter-spacing: -0.045em;
          line-height: 0.94;
        }

        .site-footer {
          align-items: flex-start;
          flex-direction: column;
          justify-content: center;
          gap: 7px;
        }
      }

      @media (prefers-reduced-motion: no-preference) {
        .hero > * {
          animation: rise 700ms both;
        }

        .hero > :nth-child(2) {
          animation-delay: 80ms;
        }

        .hero > :nth-child(3) {
          animation-delay: 160ms;
        }

        .hero > :nth-child(4) {
          animation-delay: 240ms;
        }

        @keyframes rise {
          from {
            transform: translateY(18px);
            opacity: 0;
          }
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="site-header">
        <a class="brand" href="/" aria-label="Linn Startseite">
          <span class="brand-mark" aria-hidden="true">L</span>
          <span>Linn</span>
        </a>
        <span class="status">Online</span>
      </header>

      <main class="hero">
        <p class="eyebrow">linn.saschaskaskaden.de</p>
        <h1>Ein kleiner Ort <span>für große Ideen.</span></h1>
        <p class="intro">
          Schön, dass du da bist. Diese Seite ist bereit – und wird Schritt für Schritt mit Leben gefüllt.
        </p>
        <div class="facts" aria-label="Eigenschaften">
          <span>Schlicht</span>
          <span>Schnell</span>
          <span>Persönlich</span>
        </div>
      </main>

      <footer class="site-footer">
        <span>© 2026 Linn</span>
        <span>Mit Ruhe gestaltet</span>
      </footer>
    </div>
  </body>
</html>
